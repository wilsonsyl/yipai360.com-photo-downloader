<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Yipai360 Downloader</title>
  <style>
    body { font-family: Arial, sans-serif; width: 340px; margin: 0; padding: 14px; color: #222; }
    h1 { font-size: 16px; margin: 0 0 10px; }
    p { font-size: 13px; line-height: 1.4; margin: 0 0 10px; }
    .controls { display: grid; gap: 10px; margin-bottom: 12px; }
    label { font-size: 12px; color: #444; display: block; margin-bottom: 4px; }
    select, button { width: 100%; padding: 10px 12px; border-radius: 8px; }
    select { border: 1px solid #c9ced6; background: #fff; }
    button { border: 0; background: #0b57d0; color: #fff; cursor: pointer; }
    button:disabled { opacity: .6; cursor: default; }
    .small { color: #666; font-size: 12px; }
    #status { white-space: pre-wrap; background: #f6f8fa; border-radius: 8px; padding: 10px; min-height: 48px; margin-top: 10px; }
    .progress-wrap { margin-top: 12px; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: #555; margin-bottom: 6px; }
    progress { width: 100%; height: 14px; }
  </style>
</head>
<body>
  <h1>Yipai360 Downloader</h1>
  <p>選擇下載尺寸，然後下載目前相簿。</p>
  <div class="controls">
    <div>
      <label for="quality">下載尺寸</label>
      <select id="quality">
        <option value="original">只下載原圖</option>
        <option value="1920">只下載 1920</option>
        <option value="1080">只下載 1080</option>
      </select>
    </div>
    <button id="downloadBtn">下載目前相簿</button>
  </div>
  <p class="small">支援 photolivepc / photoliveh5 頁面。</p>
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="progressText">0 / 0</span>
      <span id="progressPercent">0%</span>
    </div>
    <progress id="progressBar" value="0" max="100"></progress>
  </div>
  <div id="status">Ready.</div>
  <script src="popup.js"></script>
</body>
</html>
